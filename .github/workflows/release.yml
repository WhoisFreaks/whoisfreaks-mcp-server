name: Release

on:
  push:
    branches:
      - master

jobs:
  # ── Step 1: Gate — only proceed if commit message contains 'new-release' ──
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
      - name: Check commit message for 'new-release'
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q "new-release"; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Step 2: Build JAR + Docker image and create GitHub Release ────────────
  release:
    needs: check-trigger
    if: needs.check-trigger.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      # 1. Check out source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build the fat JAR
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Build JAR
        run: mvn clean package -q -DskipTests

      # 3. Read the version from pom.xml (used for the release tag and Docker tag)
      - name: Resolve version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # 4. Create the GitHub Release and attach the JAR
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: WhoisFreaks MCP Server v${{ steps.version.outputs.version }}
          body: |
            Released from commit: ${{ github.event.head_commit.message }}
            Commit SHA: ${{ github.sha }}
          files: target/whoisfreaks-mcp-server-*.jar

      # 5. Set up QEMU for cross-platform emulation (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 6. Set up Docker Buildx (required for multi-platform builds and
      #    for the # syntax=docker/dockerfile:1 BuildKit frontend directive)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Authenticate with Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. Build and push the multi-platform image
      #    context: .          → repo root (where pom.xml and src/ live)
      #    file: deploy/Dockerfile → path to Dockerfile from repo root
      #    platforms: linux/amd64,linux/arm64 → covers Intel, Apple Silicon, ARM VMs
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            whoisfreaks/mcp-server:${{ steps.version.outputs.version }}
            whoisfreaks/mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
