version: "3.9"

# WhoisFreaks MCP Server — Docker Compose
#
# The MCP server calls api.whoisfreaks.com directly.
# No backend services or databases are required.
#
# Usage:
#   export WHOISFREAKS_API_KEY=your-api-key-here
#   docker compose up -d
#
# With mcp-proxy (exposes the stdio server as HTTP/SSE for remote Claude connections):
#   docker compose --profile remote up -d

services:

  # -----------------------------------------------------------------------
  # Core: the MCP server itself
  # -----------------------------------------------------------------------
  whoisfreaks-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: whoisfreaks/mcp-server:1.0.0
    container_name: whoisfreaks-mcp
    restart: unless-stopped
    environment:
      WHOISFREAKS_API_KEY: ${WHOISFREAKS_API_KEY:?Set WHOISFREAKS_API_KEY in environment or .env file}
    stdin_open: true   # keeps the stdio MCP server alive
    tty: false

  # -----------------------------------------------------------------------
  # Optional: mcp-proxy — exposes stdio over HTTP/SSE for remote access
  # Enable with:  docker compose --profile remote up -d
  # Then point Claude Desktop at:  http://your-host:3100/sse
  # -----------------------------------------------------------------------
  mcp-proxy:
    image: node:20-alpine
    container_name: whoisfreaks-mcp-proxy
    profiles: [remote]
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      WHOISFREAKS_API_KEY: ${WHOISFREAKS_API_KEY}
    command: >
      sh -c "npm install -g @anthropic-ai/mcp-proxy --silent &&
             mcp-proxy --port 3100 --
             java -jar /app/app.jar"
    volumes:
      - whoisfreaks-jar:/app
    depends_on:
      - whoisfreaks-mcp

volumes:
  whoisfreaks-jar:
