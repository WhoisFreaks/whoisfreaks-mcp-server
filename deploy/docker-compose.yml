version: "3.9"

# Full WhoisFreaks stack:
#   - ip-whois-api    : IP and ASN WHOIS backend (Spring Boot)
#   - asn-whois-api   : ASN data backend (Spring Boot + Redis)
#   - redis           : Cache for asn-whois-api
#   - whoisfreaks-mcp : MCP server (this project)
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - whoisfreaks

  ip-whois-api:
    image: whoisfreaks/ip-whois-api:latest   # build from your IP-whois-api project
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - whoisfreaks

  asn-whois-api:
    image: whoisfreaks/asn-whois-api:latest  # build from your asn-whois-api project
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - whoisfreaks

  whoisfreaks-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      WHOISFREAKS_API_KEY: ${WHOISFREAKS_API_KEY}
      WHOISFREAKS_IP_WHOIS_URL: http://ip-whois-api:8080
      WHOISFREAKS_ASN_WHOIS_URL: http://asn-whois-api:8081
    depends_on:
      - ip-whois-api
      - asn-whois-api
    stdin_open: true   # keeps the stdio MCP server alive
    tty: false
    networks:
      - whoisfreaks

networks:
  whoisfreaks:
    driver: bridge
